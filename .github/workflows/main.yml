  name: Java and Python CI Pipeline

  on:
    push:
      branches: [ "main", "develop" ]
    pull_request:
      branches: [ "main", "develop" ]

  jobs:
    # Job 1: Compile and verify Java backend
    build-java:
      runs-on: ubuntu-latest
      steps:
        - name: Check out repository
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: 'gradle'

        - name: Grant execute permission for gradlew
          run: chmod +x gradlew

        - name: Build with Gradle (Exclude Tests)
          # -x test skips tests for rapid development while ensuring code compiles successfully
          run: ./gradlew build -x test

    # Job 2: Lint and check Python crawler code
    lint-python:
      runs-on: ubuntu-latest
      steps:
        - name: Check out repository
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'
            cache: 'pip'

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
            pip install flake8

        - name: Lint with flake8
          run: |
            # Stop build if there are Python syntax errors or undefined names
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
            # Exit-zero treats all other style violations as warnings
            flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics